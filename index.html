<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BlackDz — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet"/>

<!-- ════════════════════════════════════════════════
     FIREBASE — Cole sua config aqui ↓
     Substitua APENAS o bloco firebaseConfig abaixo
     ════════════════════════════════════════════════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, onDisconnect, serverTimestamp, onValue, off } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

// ▼▼▼ COLE SUA CONFIG AQUI ▼▼▼
const firebaseConfig = {
  apiKey: "AIzaSyBbA8DP7UrhpjaO-pI_mWiS5OFKhdUk8m0",
  authDomain: "blackdz-chat.firebaseapp.com",
  databaseURL: "https://blackdz-chat-default-rtdb.firebaseio.com",
  projectId: "blackdz-chat",
  storageBucket: "blackdz-chat.firebasestorage.app",
  messagingSenderId: "1035461969020",
  appId: "1:1035461969020:web:0219ae1d67ac03dca1f5f9"
};
// ▲▲▲ FIM DA CONFIG ▲▲▲

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── State
let username = "", uid = "u" + Math.random().toString(36).slice(2, 8), room = "";
let lastAuthor = "";
let msgRef = null, presRef = null, typingRef = null;
let typingTimer = null;
const ICONS = { geral: "💬", gaming: "🎮", offtopic: "🔥" };

// ── URL params
const params = new URLSearchParams(location.search);
const inviteRoom = params.get("room");
if (inviteRoom) document.getElementById("uname").placeholder = "Entrando em #" + inviteRoom + "...";
document.getElementById("uname").addEventListener("keydown", e => { if (e.key === "Enter") goToRooms(); });

window.goToRooms = function () {
  const v = document.getElementById("uname").value.trim();
  if (!v) { showToast("Digite seu nome!"); return; }
  username = v;
  document.getElementById("wname").textContent = username;
  show("room-screen"); hide("login-screen");
  if (inviteRoom) { joinRoom(inviteRoom); return; }
};

window.joinRoom = function (r) {
  room = r.toLowerCase().replace(/[^a-z0-9\-_]/g, "").slice(0, 30) || "geral";
  setupChat();
};

window.joinCustomRoom = function () {
  const v = document.getElementById("croom").value.trim();
  if (!v) { showToast("Digite o nome da sala!"); return; }
  window.joinRoom(v);
};

window.backToRooms = function () {
  leaveRoom();
  hide("chat-screen"); show("room-screen");
};

window.copyInvite = function () {
  const url = location.origin + location.pathname + "?room=" + room;
  navigator.clipboard.writeText(url).then(() => showToast("🔗 Link copiado! Manda pra galera"));
};

// ── Chat setup
function setupChat() {
  hide("room-screen"); show("chat-screen");
  document.getElementById("h-icon").textContent = ICONS[room] || "🏠";
  document.getElementById("h-room").textContent = "#" + room;
  document.getElementById("msgs").innerHTML = '<div class="date-sep">Hoje</div>';
  lastAuthor = "";
  startFirebase();
  document.getElementById("minput").focus();
}

// ── Firebase realtime
function startFirebase() {
  connBar("⚡ Conectando...", false);

  // 1) Mensagens
  msgRef = ref(db, "rooms/" + room + "/msgs");
  // Só pega as novas mensagens a partir de agora
  const cutoff = Date.now();
  onChildAdded(msgRef, snap => {
    const data = snap.val();
    if (!data || data.ts < cutoff - 5000) return; // ignora histórico antigo
    const isMe = data.uid === uid;
    renderMsg(data, isMe);
    scrollBottom();
  });

  // 2) Presença
  presRef = ref(db, "rooms/" + room + "/presence/" + uid);
  set(presRef, { name: username, online: true, ts: serverTimestamp() });
  onDisconnect(presRef).remove();

  // 3) Contar online
  const allPresRef = ref(db, "rooms/" + room + "/presence");
  onValue(allPresRef, snap => {
    const count = snap.exists() ? Object.keys(snap.val()).length : 1;
    document.getElementById("online-n").textContent = count;
  });

  // 4) Typing
  typingRef = ref(db, "rooms/" + room + "/typing/" + uid);
  onDisconnect(typingRef).remove();

  const allTypingRef = ref(db, "rooms/" + room + "/typing");
  onValue(allTypingRef, snap => {
    if (!snap.exists()) { updateTypingBar([]); return; }
    const names = Object.entries(snap.val())
      .filter(([id]) => id !== uid)
      .map(([, v]) => v.name);
    updateTypingBar(names);
  });

  connBar("● Conectado — compartilhe o link!", true);
}

function leaveRoom() {
  if (presRef) { set(presRef, null); presRef = null; }
  if (typingRef) { set(typingRef, null); typingRef = null; }
  if (msgRef) { off(msgRef); msgRef = null; }
  room = "";
}

// ── Send
window.sendMsg = function () {
  const inp = document.getElementById("minput");
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ""; inp.style.height = "auto";
  clearTypingSignal();
  const data = { uid, author: username, text, ts: Date.now() };
  push(ref(db, "rooms/" + room + "/msgs"), data);
  // Renderiza imediatamente pra quem enviou
  renderMsg(data, true); scrollBottom();
};

window.handleKey = function (e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); return; }
  const ta = e.target; ta.style.height = "auto"; ta.style.height = Math.min(ta.scrollHeight, 100) + "px";
};

window.handleTyping = function (ta) {
  ta.style.height = "auto"; ta.style.height = Math.min(ta.scrollHeight, 100) + "px";
  if (typingRef) set(typingRef, { name: username, ts: Date.now() });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(clearTypingSignal, 2500);
};

function clearTypingSignal() {
  if (typingRef) set(typingRef, null);
}

// ── Render
function renderMsg(data, isMe) {
  // Evita duplicar msg própria (onChildAdded pode disparar pro remetente)
  const msgs = document.getElementById("msgs");
  const same = data.author === lastAuthor;
  lastAuthor = data.author;
  const color = strColor(data.author);
  const g = document.createElement("div");
  g.className = "mgroup" + (isMe ? " mine" : "");
  if (!same) {
    const m = document.createElement("div");
    m.className = "mmeta";
    m.innerHTML = `<div class="mavatar" style="background:${color}">${data.author[0].toUpperCase()}</div><span class="mauthor" style="color:${color}">${esc(isMe ? "Você" : data.author)}</span><span class="mtime">${fmtTime(data.ts)}</span>`;
    g.appendChild(m);
  }
  const b = document.createElement("div");
  b.className = "mbubble"; b.textContent = data.text;
  g.appendChild(b); msgs.appendChild(g);
}

function updateTypingBar(names) {
  const bar = document.getElementById("tbar");
  if (!names.length) { bar.innerHTML = ""; return; }
  const shown = names.slice(0, 2);
  bar.innerHTML = `<div class="tdots"><i></i><i></i><i></i></div><span>${esc(shown.join(", "))} ${shown.length === 1 ? "está" : "estão"} digitando...</span>`;
}

function scrollBottom() {
  const m = document.getElementById("msgs"); m.scrollTop = m.scrollHeight;
}
function connBar(msg, ok) {
  const b = document.getElementById("conn-bar");
  b.textContent = msg; b.className = "conn-bar" + (ok ? " ok" : "");
  if (ok) setTimeout(() => { b.style.display = "none"; }, 2500);
  else b.style.display = "flex";
}

// ── Utils
function strColor(s) { let h = 0; for (let c of s) h = c.charCodeAt(0) + ((h << 5) - h); return ["#7c5cfc", "#a78bfa", "#ec4899", "#f97316", "#22c55e", "#06b6d4", "#eab308", "#ef4444"][Math.abs(h) % 8]; }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }); }
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function show(id) { document.getElementById(id).style.display = "flex"; }
function hide(id) { document.getElementById(id).style.display = "none"; }
function showToast(msg) { const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2800); }
</script>

<style>
:root{--bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--surface3:#26262e;--accent:#7c5cfc;--accent2:#a78bfa;--online:#22c55e;--text:#e4e4f0;--muted:#6b6b80;--border:rgba(255,255,255,0.06);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;width:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(124,92,252,.12) 0%,transparent 70%),radial-gradient(ellipse 40% 50% at 80% 80%,rgba(124,92,252,.08) 0%,transparent 70%);}
#login-screen{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:28px;width:100%;max-width:380px;padding:24px;}
.logo-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#7c5cfc,#a78bfa);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;color:white;box-shadow:0 0 40px rgba(124,92,252,.5);animation:pulse 3s ease-in-out infinite;margin:0 auto;}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(124,92,252,.4)}50%{box-shadow:0 0 70px rgba(124,92,252,.7)}}
.logo-name{font-family:'Rajdhani',sans-serif;font-size:38px;font-weight:700;background:linear-gradient(90deg,#7c5cfc,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;text-align:center;}
.logo-sub{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;text-align:center;}
.login-card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;display:flex;flex-direction:column;gap:16px;}
.login-card h2{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:600;color:white;}
.login-card p{font-size:13px;color:var(--muted);}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.field input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;outline:none;transition:.2s;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,.15);}
.field input::placeholder{color:var(--muted);}
.btn-primary{padding:13px;border:none;border-radius:10px;cursor:pointer;background:linear-gradient(135deg,#7c5cfc,#a78bfa);color:white;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;transition:.15s;box-shadow:0 4px 20px rgba(124,92,252,.35);}
.btn-primary:hover{opacity:.9;}.btn-primary:active{transform:scale(.98);}
#room-screen{position:relative;z-index:10;display:none;flex-direction:column;align-items:center;gap:20px;width:100%;max-width:420px;padding:24px;}
.rooms-grid{display:flex;flex-direction:column;gap:8px;width:100%;}
.room-btn{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.2s;width:100%;text-align:left;}
.room-btn:hover{border-color:var(--accent);background:var(--surface2);}
.room-icon{font-size:22px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:10px;flex-shrink:0;}
.room-info{flex:1;}.room-name{font-weight:700;font-size:15px;color:white;}.room-desc{font-size:12px;color:var(--muted);margin-top:2px;}
.room-badge{font-size:11px;color:var(--online);font-weight:700;}
.or-div{display:flex;align-items:center;gap:12px;width:100%;color:var(--muted);font-size:12px;}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:var(--border);}
.custom-row{display:flex;gap:8px;width:100%;}
.custom-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:.2s;}
.custom-row input:focus{border-color:var(--accent);}
.custom-row input::placeholder{color:var(--muted);}
.btn-sec{padding:12px 16px;border:1px solid var(--accent);border-radius:10px;cursor:pointer;background:transparent;color:var(--accent);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;transition:.2s;white-space:nowrap;}
.btn-sec:hover{background:rgba(124,92,252,.1);}
#chat-screen{display:none;flex-direction:column;width:100%;max-width:700px;height:100vh;position:relative;z-index:10;}
.chat-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.back-btn{width:34px;height:34px;border-radius:8px;border:none;background:var(--surface2);color:var(--muted);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s;}
.back-btn:hover{color:white;}
.h-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7c5cfc,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.h-info{flex:1;min-width:0;}
.h-room{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:white;}
.h-status{font-size:12px;color:var(--online);font-weight:600;}
.invite-btn{background:rgba(124,92,252,.15);border:1px solid rgba(124,92,252,.3);color:var(--accent2);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;}
.conn-bar{display:flex;align-items:center;gap:8px;padding:6px 16px;background:rgba(239,68,68,.1);border-bottom:1px solid rgba(239,68,68,.2);font-size:12px;color:#fca5a5;flex-shrink:0;}
.conn-bar.ok{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.15);color:#86efac;}
.msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:2px;}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.date-sep{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:12px 0 8px;}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border);}
.mgroup{display:flex;flex-direction:column;margin-bottom:10px;}
.mmeta{display:flex;align-items:center;gap:8px;margin-bottom:3px;padding:0 2px;}
.mavatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;}
.mauthor{font-size:13px;font-weight:700;}.mtime{font-size:11px;color:var(--muted);}
.mbubble{background:var(--surface2);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:9px 13px;font-size:14px;line-height:1.5;color:var(--text);max-width:85%;word-break:break-word;margin-left:38px;animation:popin .18s ease;}
@keyframes popin{from{opacity:0;transform:translateY(5px) scale(.97)}to{opacity:1;transform:none}}
.mgroup.mine .mmeta{flex-direction:row-reverse;}
.mgroup.mine .mbubble{background:linear-gradient(135deg,rgba(124,92,252,.28),rgba(167,139,250,.15));border-color:rgba(124,92,252,.35);border-radius:14px 4px 14px 14px;margin-left:0;margin-right:38px;}
.sys{text-align:center;font-size:12px;color:var(--muted);padding:5px;margin:6px 0;background:rgba(255,255,255,.02);border-radius:8px;}
.sys span{color:var(--accent2);font-weight:600;}
.typing-bar{padding:2px 16px;font-size:12px;color:var(--muted);min-height:22px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tdots{display:flex;gap:3px;}
.tdots i{width:5px;height:5px;border-radius:50%;background:var(--muted);display:inline-block;animation:tb 1.2s ease-in-out infinite;}
.tdots i:nth-child(2){animation-delay:.2s}.tdots i:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-5px);opacity:1}}
.input-area{padding:10px 16px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;}
.ibox{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:5px 5px 5px 14px;transition:.2s;}
.ibox:focus-within{border-color:rgba(124,92,252,.4);}
.ibox textarea{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;resize:none;max-height:100px;line-height:1.5;padding:7px 0;}
.ibox textarea::placeholder{color:var(--muted);}
.sbtn{width:38px;height:38px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,#7c5cfc,#a78bfa);color:white;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;box-shadow:0 2px 12px rgba(124,92,252,.4);}
.sbtn:hover{opacity:.85;}.sbtn:active{transform:scale(.92);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface3);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--text);opacity:0;transition:all .3s;z-index:100;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="login-screen">
  <div class="logo-icon">Bz</div>
  <div class="logo-name">BlackDz</div>
  <div class="logo-sub">Chat em tempo real</div>
  <div class="login-card">
    <h2>Entrar no chat</h2>
    <p>Escolha um nome pra aparecer no chat</p>
    <div class="field">
      <label>Seu nome</label>
      <input id="uname" type="text" placeholder="Ex: Shadow_X" maxlength="20" autocomplete="off"/>
    </div>
    <button class="btn-primary" onclick="goToRooms()">Continuar →</button>
  </div>
</div>

<div id="room-screen">
  <div class="logo-name" style="font-size:26px;">BlackDz</div>
  <div style="width:100%;max-width:420px;padding:0 16px;display:flex;flex-direction:column;gap:14px;">
    <div style="font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:600;color:white;">
      Olá, <span id="wname" style="color:var(--accent2)"></span>! Escolha a sala:
    </div>
    <div class="rooms-grid">
      <button class="room-btn" onclick="joinRoom('geral')">
        <div class="room-icon">💬</div>
        <div class="room-info"><div class="room-name">Geral</div><div class="room-desc">Bate-papo aberto</div></div>
      </button>
      <button class="room-btn" onclick="joinRoom('gaming')">
        <div class="room-icon">🎮</div>
        <div class="room-info"><div class="room-name">Gaming</div><div class="room-desc">Jogos e ranked</div></div>
      </button>
      <button class="room-btn" onclick="joinRoom('offtopic')">
        <div class="room-icon">🔥</div>
        <div class="room-info"><div class="room-name">Off-topic</div><div class="room-desc">Qualquer papo</div></div>
      </button>
    </div>
    <div class="or-div">ou sala privada</div>
    <div class="custom-row">
      <input id="croom" type="text" placeholder="nome-da-sala" maxlength="30"/>
      <button class="btn-sec" onclick="joinCustomRoom()">Entrar</button>
    </div>
  </div>
</div>

<div id="chat-screen">
  <div id="conn-bar" class="conn-bar">⚡ Conectando...</div>
  <div class="chat-header">
    <button class="back-btn" onclick="backToRooms()">←</button>
    <div class="h-icon" id="h-icon">💬</div>
    <div class="h-info">
      <div class="h-room" id="h-room">#geral</div>
      <div class="h-status">● <span id="online-n">1</span> online</div>
    </div>
    <button class="invite-btn" onclick="copyInvite()">🔗 Convidar</button>
  </div>
  <div class="msgs" id="msgs"><div class="date-sep">Hoje</div></div>
  <div class="typing-bar" id="tbar"></div>
  <div class="input-area">
    <div class="ibox">
      <textarea id="minput" placeholder="Mande uma mensagem..." rows="1"
        onkeydown="handleKey(event)" oninput="handleTyping(this)"></textarea>
      <button class="sbtn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
</body>
</html>
